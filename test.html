<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KaiMail - Hệ thống Get Mail</title>
    <style>
        :root {
            --bg: #eef4fb;
            --card: #ffffff;
            --line: #dbe6f2;
            --text: #17345e;
            --muted: #6e84a3;
            --primary: #1f7a45;
            --primary-hover: #186238;
            --soft: #f7fbff;
            --tag: #f2f7fd;
            --shadow: 0 10px 30px rgba(15, 40, 80, 0.08);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
            color: var(--text);
        }

        button,
        input {
            font: inherit;
        }

        .container {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(219, 230, 242, 0.9);
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .topbar-inner {
            min-height: 88px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            font-size: clamp(32px, 4vw, 56px);
            line-height: 1;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #1b3d73;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pill-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--tag);
            border: 1px solid var(--line);
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .pill-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(41, 85, 144, 0.10);
        }

        .main {
            padding: 36px 0 48px;
        }

        .hero-card,
        .inbox-card {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(219, 230, 242, 0.95);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .hero-card {
            padding: 20px;
            margin-bottom: 24px;
        }

        .mail-toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .mail-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 10px 12px 10px 18px;
            min-height: 64px;
        }

        .mail-input {
            border: 0;
            outline: 0;
            width: 100%;
            font-size: 28px;
            line-height: 1.1;
            color: var(--text);
            background: transparent;
            font-weight: 600;
        }

        .mail-input::placeholder {
            color: #a0b1c9;
        }

        .icon-btn,
        .primary-btn,
        .secondary-btn {
            border: 0;
            cursor: pointer;
            transition: .2s ease;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: #5b40a8;
            color: #fff;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            font-size: 20px;
        }

        .icon-btn.copy {
            background: #eef5ff;
            color: #2563eb;
            border: 1px solid var(--line);
        }

        .icon-btn.refresh {
            background: #eef5ff;
            color: #2563eb;
            border: 1px solid var(--line);
        }

        .icon-btn.refresh svg {
            transition: transform .2s ease;
        }

        .icon-btn.refresh.animate svg {
            animation: spin-refresh 0.6s ease-in-out;
        }

        @keyframes spin-refresh {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .icon-btn:hover,
        .primary-btn:hover,
        .secondary-btn:hover {
            transform: translateY(-1px);
        }

        .primary-btn {
            min-width: 160px;
            min-height: 64px;
            padding: 0 24px;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            box-shadow: 0 12px 24px rgba(31, 122, 69, .22);
        }

        .primary-btn:hover {
            background: var(--primary-hover);
        }

        .inbox-card {
            overflow: hidden;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 22px 18px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, #f8fbff 0%, #f3f8ff 100%);
        }

        .section-title {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(30px, 3vw, 42px);
            letter-spacing: -0.03em;
        }

        .section-title small {
            font-size: 18px;
            color: var(--muted);
            font-weight: 600;
        }

        .mail-list {
            background: rgba(255, 255, 255, 0.82);
        }

        .mail-item {
            border-bottom: 1px solid #edf2f8;
            transition: background .2s ease;
        }

        .mail-item:last-child {
            border-bottom: 0;
        }

        .mail-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            padding: 22px;
            cursor: pointer;
            align-items: start;
        }

        .mail-item:hover {
            background: #fbfdff;
        }

        .mail-item.active {
            background: #f8fbff;
        }

        .mail-from {
            font-size: 18px;
            font-weight: 800;
            color: #173d75;
            margin: 0 0 6px;
        }

        .mail-subject {
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
            color: #314b73;
        }

        .mail-time {
            color: #93a4bd;
            font-weight: 600;
            white-space: nowrap;
            padding-top: 4px;
        }

        .mail-detail-wrap {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height .35s ease, opacity .28s ease, padding .35s ease;
            padding: 0 22px;
        }

        .mail-item.active .mail-detail-wrap {
            max-height: 1200px;
            opacity: 1;
            padding: 0 22px 22px;
        }

        .mail-detail {
            border: 1px solid var(--line);
            border-radius: 20px;
            background: #fff;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7);
        }

        .detail-head {
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
            background: #fcfeff;
        }

        .detail-title {
            margin: 0 0 6px;
            font-size: 22px;
            line-height: 1.35;
            letter-spacing: -0.02em;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            color: var(--muted);
            font-size: 14px;
        }

        .detail-body {
            padding: 28px 20px;
            color: #24324a;
            line-height: 1.7;
            font-size: 16px;
        }

        .code-box {
            margin: 20px 0;
            background: #f5f7fb;
            border: 1px solid #e3ebf6;
            border-radius: 18px;
            padding: 22px 26px;
            font-size: clamp(34px, 5vw, 52px);
            letter-spacing: .08em;
            font-weight: 800;
            color: #314155;
            width: fit-content;
            min-width: min(100%, 340px);
        }

        .detail-body p {
            margin: 0 0 16px;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0 20px 22px;
        }

        .secondary-btn {
            padding: 12px 18px;
            border-radius: 14px;
            background: #eef5ff;
            color: #1f4fd2;
            font-weight: 700;
            border: 1px solid var(--line);
        }

        .empty-state {
            padding: 64px 22px 72px;
            text-align: center;
            color: var(--muted);
        }

        .empty-icon {
            width: 88px;
            height: 88px;
            border-radius: 999px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #f7faff, #eef4fb);
            border: 1px solid var(--line);
            font-size: 34px;
        }

        .hint {
            margin-top: 14px;
            font-size: 14px;
            color: #96a8c0;
        }

        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: rgba(23, 52, 94, 0.95);
            color: #fff;
            padding: 14px 18px;
            border-radius: 14px;
            box-shadow: 0 14px 34px rgba(15, 40, 80, 0.24);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: .28s ease;
            z-index: 60;
            font-weight: 700;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 900px) {

            .topbar-inner,
            .mail-toolbar {
                grid-template-columns: 1fr;
                display: grid;
            }

            .brand {
                font-size: 42px;
            }

            .actions {
                justify-content: flex-start;
            }

            .primary-btn {
                width: 100%;
            }

            .mail-input {
                font-size: 20px;
            }
        }

        @media (max-width: 640px) {
            .container {
                width: min(100% - 20px, 1100px);
            }

            .hero-card,
            .inbox-card {
                border-radius: 20px;
            }

            .mail-row,
            .section-head,
            .detail-head,
            .detail-body,
            .detail-actions {
                padding-left: 16px;
                padding-right: 16px;
            }

            .mail-detail-wrap,
            .mail-item.active .mail-detail-wrap {
                padding-left: 16px;
                padding-right: 16px;
            }

            .mail-row {
                grid-template-columns: 1fr;
            }

            .mail-time {
                padding-top: 0;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="brand">KaiMail</div>
            <div class="actions">
                <a class="pill-link" href="https://kaishop.id.vn" target="_blank" rel="noreferrer">🌐 Website:
                    kaishop.id.vn</a>
                <a class="pill-link" href="https://t.me/KaiHub_bot" target="_blank" rel="noreferrer">🤖 Bot Telegram:
                    @KaiHub_bot</a>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="hero-card">
                <div class="mail-toolbar">
                    <div class="mail-input-wrap">
                        <input id="emailInput" class="mail-input" type="text" value="sarahmiller655@kaishop.id.vn"
                            aria-label="Email tạm thời" />
                        <button id="randomBtn" class="icon-btn" title="Random mail">t</button>
                        <button id="copyBtn" class="icon-btn copy" title="Copy email">⧉</button>
                    </div>
                    <button id="getMailBtn" class="primary-btn">Get Mail →</button>
                </div>
            </section>

            <section class="inbox-card">
                <div class="section-head">
                    <h2 class="section-title">✉️ Hộp thư <small id="mailCount"></small></h2>
                    <button id="refreshBtn" class="icon-btn refresh" title="Làm mới">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>

                <div id="mailList" class="mail-list"></div>
            </section>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const sampleMails = [
            {
                id: 1,
                from: 'OpenAI',
                fromEmail: 'noreply@openai.com',
                subject: 'Your ChatGPT code is 251877',
                preview: 'Enter this temporary verification code to continue: 251877',
                time: '38 phút trước',
                dateText: '08/03/2026 11:37',
                code: '251877',
                body: [
                    'Enter this temporary verification code to continue:',
                    'If you were not trying to log in to ChatGPT, please reset your password.',
                    'Best,',
                    'The ChatGPT team'
                ]
            },
            {
                id: 2,
                from: 'OpenAI',
                fromEmail: 'noreply@openai.com',
                subject: 'Your ChatGPT code is 130560',
                preview: 'Your temporary login code is 130560',
                time: '14 giờ trước',
                dateText: '07/03/2026 21:18',
                code: '130560',
                body: [
                    'Use the verification code below to finish signing in.',
                    'If this wasn\'t you, we recommend changing your password immediately.'
                ]
            },
            {
                id: 3,
                from: 'OpenAI',
                fromEmail: 'noreply@openai.com',
                subject: 'Your ChatGPT code is 043841',
                preview: 'Use this code to continue your login: 043841',
                time: '14 giờ trước',
                dateText: '07/03/2026 20:52',
                code: '043841',
                body: [
                    'This code expires soon. Please enter it on the login screen to continue.',
                    'If you didn\'t request this email, you can ignore it safely.'
                ]
            }
        ];

        let currentEmail = 'sarahmiller655@kaishop.id.vn';
        let mails = [...sampleMails];
        let activeMailId = sampleMails[0]?.id || null;

        const emailInput = document.getElementById('emailInput');
        const mailList = document.getElementById('mailList');
        const mailCount = document.getElementById('mailCount');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(showToast._timer);
            showToast._timer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function escapeHtml(str = '') {
            return str
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function renderMails() {
            mailCount.textContent = mails.length ? `(${mails.length} thư)` : '(0 thư)';

            if (!mails.length) {
                mailList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3 style="margin:0 0 8px; font-size:28px; color:#6d81a0;">Chưa có thư</h3>
            <p style="margin:0; font-size:16px;">Bấm <strong>Get Mail</strong> hoặc <strong>Làm mới</strong> để tải hộp thư.</p>
            <div class="hint">Đây là dữ liệu mẫu. Sau này chỉ cần thay mảng sampleMails bằng API thật.</div>
          </div>
        `;
                return;
            }

            mailList.innerHTML = mails.map(mail => {
                const activeClass = mail.id === activeMailId ? 'active' : '';
                const paragraphs = mail.body.map(text => `<p>${escapeHtml(text)}</p>`).join('');
                return `
          <article class="mail-item ${activeClass}" data-id="${mail.id}">
            <div class="mail-row" role="button" tabindex="0" aria-expanded="${mail.id === activeMailId}">
              <div>
                <p class="mail-from">${escapeHtml(mail.from)}</p>
                <p class="mail-subject">${escapeHtml(mail.subject)}</p>
                <p class="mail-subject" style="margin-top:4px; color:#6b7f9c;">${escapeHtml(mail.preview)}</p>
              </div>
              <div class="mail-time">${escapeHtml(mail.time)}</div>
            </div>
            <div class="mail-detail-wrap">
              <div class="mail-detail">
                <div class="detail-head">
                  <h3 class="detail-title">${escapeHtml(mail.subject)}</h3>
                  <div class="detail-meta">
                    <span><strong>Người gửi:</strong> ${escapeHtml(mail.from)} | ${escapeHtml(mail.fromEmail)}</span>
                    <span><strong>Thời gian:</strong> ${escapeHtml(mail.dateText)}</span>
                    <span><strong>Đến:</strong> ${escapeHtml(currentEmail)}</span>
                  </div>
                </div>
                <div class="detail-body">
                  <div style="font-size:72px; line-height:1; margin-bottom:22px; font-weight:900; letter-spacing:-0.05em; color:#000;">OpenAI</div>
                  ${paragraphs}
                  ${mail.code ? `<div class="code-box">${escapeHtml(mail.code)}</div>` : ''}
                  <p>Nếu bạn không thực hiện hành động này, hãy đổi mật khẩu ngay để bảo mật tài khoản.</p>
                </div>
                <div class="detail-actions">
                  <button class="secondary-btn" onclick="copyCode('${escapeHtml(mail.code || '')}')">Copy code</button>
                  <button class="secondary-btn" onclick="removeMail(${mail.id})">Xóa thư mẫu</button>
                </div>
              </div>
            </div>
          </article>
        `;
            }).join('');

            bindMailEvents();
        }

        function bindMailEvents() {
            document.querySelectorAll('.mail-row').forEach(row => {
                row.addEventListener('click', () => {
                    const item = row.closest('.mail-item');
                    const id = Number(item.dataset.id);
                    activeMailId = activeMailId === id ? null : id;
                    renderMails();
                });

                row.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        row.click();
                    }
                });
            });
        }

        function randomName() {
            const first = ['sarah', 'alex', 'mike', 'luna', 'john', 'anna', 'kai', 'mila'];
            const last = ['miller', 'tran', 'pham', 'nguyen', 'lee', 'hoang', 'smith', 'do'];
            const n = Math.floor(Math.random() * 900 + 100);
            return `${first[Math.floor(Math.random() * first.length)]}${last[Math.floor(Math.random() * last.length)]}${n}`;
        }

        function generateEmail() {
            currentEmail = `${randomName()}@kaishop.id.vn`;
            emailInput.value = currentEmail;
            showToast('Đã tạo email mới');
            activeMailId = mails[0]?.id || null;
            renderMails();
        }

        async function copyEmail() {
            try {
                await navigator.clipboard.writeText(emailInput.value.trim());
                showToast('Đã copy email');
            } catch {
                showToast('Không copy được, hãy copy thủ công');
            }
        }

        async function copyCode(code) {
            if (!code) return showToast('Không có mã để copy');
            try {
                await navigator.clipboard.writeText(code);
                showToast(`Đã copy code ${code}`);
            } catch {
                showToast('Không copy được code');
            }
        }
        window.copyCode = copyCode;

        function removeMail(id) {
            mails = mails.filter(mail => mail.id !== id);
            if (activeMailId === id) activeMailId = mails[0]?.id || null;
            renderMails();
            showToast('Đã xóa thư mẫu');
        }
        window.removeMail = removeMail;

        function refreshMail() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('animate');
            setTimeout(() => btn.classList.remove('animate'), 600);

            currentEmail = emailInput.value.trim() || currentEmail;
            emailInput.value = currentEmail;
            renderMails();
            showToast('Đã làm mới hộp thư');
        }

        function getMail() {
            currentEmail = emailInput.value.trim() || currentEmail;
            emailInput.value = currentEmail;
            renderMails();
            showToast(`Đã tải mail cho ${currentEmail}`);
        }

        document.getElementById('randomBtn').addEventListener('click', generateEmail);
        document.getElementById('copyBtn').addEventListener('click', copyEmail);
        document.getElementById('refreshBtn').addEventListener('click', refreshMail);
        document.getElementById('getMailBtn').addEventListener('click', getMail);
        emailInput.addEventListener('change', () => {
            currentEmail = emailInput.value.trim() || currentEmail;
        });

        renderMails();
    </script>
</body>

</html>
