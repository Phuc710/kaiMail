<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8d9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#1a1a1a" stroke="url(#grad)" stroke-width="2"/>

  <!-- Envelope body -->
  <rect x="20" y="35" width="60" height="40" rx="4" fill="url(#grad)" opacity="0.9"/>

  <!-- Envelope flap (top triangle) -->
  <polygon points="20,35 50,55 80,35" fill="url(#grad)"/>

  <!-- Envelope lines -->
  <line x1="20" y1="35" x2="50" y2="55" stroke="#0d0d0d" stroke-width="2"/>
  <line x1="80" y1="35" x2="50" y2="55" stroke="#0d0d0d" stroke-width="2"/>

  <!-- Sparkle dots -->
  <circle cx="15" cy="25" r="2" fill="#00d9ff" opacity="0.8"/>
  <circle cx="85" cy="25" r="1.5" fill="#00d9ff" opacity="0.6"/>
  <circle cx="12" cy="75" r="1" fill="#00d9ff" opacity="0.5"/>
</svg>
